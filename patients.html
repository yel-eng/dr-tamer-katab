<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 ملفات المرضى - عيادة الدكتور تامر خطاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--main:#1a237e;--main-light:#3949ab;--bg:#f4f7f6;--white:#fff;--text:#333;--text-light:#64748b;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--whatsapp:#25d366;--radius:14px;--shadow:0 4px 16px rgba(0,0,0,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);padding:20px;margin-right:240px;line-height:1.6}
.side-nav{position:fixed;top:0;right:0;width:240px;height:100vh;background:linear-gradient(180deg,var(--main),var(--main-light));padding:25px 15px;display:flex;flex-direction:column;gap:10px;z-index:999;box-shadow:-5px 0 20px rgba(0,0,0,0.2)}
.side-nav .logo{color:#fff;text-align:center;margin:10px 0 25px;font-size:17px;font-weight:bold;line-height:1.4}
.side-nav a.active{background:var(--white);color:var(--main);font-weight:bold}
.side-nav a.disabled{opacity:0.5;pointer-events:none}
.side-nav a{text-decoration:none;color:#fff;padding:12px;border-radius:10px;transition:0.3s;font-size:14px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.side-nav a:hover{background:rgba(255,255,255,0.15)}
.side-nav .logout-btn{margin-top:auto;background:#ef4444;color:#fff;border:none;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;transition:0.2s}
.side-nav .logout-btn:hover{background:#dc2626}
.main-content{padding:25px;width:100%}
.page-header{background:linear-gradient(180deg,#1e3a8a,#1d4ed8);color:#fff;padding:20px 25px;border-radius:var(--radius);margin-bottom:25px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.page-header h2{font-size:18px;display:flex;align-items:center;gap:8px}
.search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:25px;background:var(--white);padding:15px;border-radius:var(--radius);box-shadow:var(--shadow)}
.search-bar input,.search-bar select{padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;min-width:200px}
.search-bar input:focus,.search-bar select:focus{border-color:var(--main);outline:none;box-shadow:0 0 0 3px rgba(26,35,126,0.15)}
.search-bar .btn{padding:10px 20px}
.patients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.patient-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:0.3s;position:relative}
.patient-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.12)}
.patient-header{background:linear-gradient(135deg,var(--main),var(--main-light));color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.patient-header h3{font-size:16px;font-weight:600}
.patient-header .phone{font-size:13px;opacity:0.9;display:flex;align-items:center;gap:4px}
.patient-body{padding:20px}
.patient-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.patient-row:last-child{border-bottom:none}
.patient-row .label{color:var(--text-light)}
.patient-row .value{font-weight:500}
.patient-actions{display:flex;gap:8px;padding:15px 20px;background:#f8fafc;border-top:1px solid #eef2f7}
.patient-actions button{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:4px}
.patient-actions .btn-view{background:#0ea5e9;color:#fff}
.patient-actions .btn-whatsapp{background:var(--whatsapp);color:#fff}
.patient-actions .btn-edit{background:var(--warning);color:#000}
.patient-actions .btn-delete{background:var(--danger);color:#fff}
.patient-actions button:hover{transform:translateY(-2px);filter:brightness(0.95)}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,35,126,0.85);z-index:10000;display:flex;justify-content:center;align-items:center;padding:15px}
.modal-content{background:var(--white);width:100%;max-width:600px;border-radius:15px;padding:25px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;left:12px;width:30px;height:30px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{color:var(--main);text-align:center;margin:0 0 20px;font-size:18px;font-weight:600;border-bottom:1px solid #eee;padding-bottom:15px}
.modal-section{margin-bottom:20px}
.modal-section h4{color:var(--main);margin-bottom:10px;font-size:14px;display:flex;align-items:center;gap:6px}
.modal-section input,.modal-section textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:10px}
.modal-section input:focus,.modal-section textarea:focus{border-color:var(--main);outline:none;box-shadow:0 0 0 3px rgba(26,35,126,0.15)}
.modal-section textarea{min-height:80px;resize:vertical}
.sessions-list{max-height:200px;overflow-y:auto;border:1px solid #eef2f7;border-radius:8px}
.session-item{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.session-item:last-child{border-bottom:none}
.session-item .date{color:var(--text-light)}
.session-item .actions{display:flex;gap:4px}
.session-item .actions button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:15px;border-top:1px solid #eee}
.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.modal-btn-primary{background:var(--main);color:#fff}
.modal-btn-primary:hover{background:var(--main-light)}
.modal-btn-cancel{background:#f1f5f9;color:var(--text)}
.modal-btn-cancel:hover{background:#e2e8f0}
.modal-btn-whatsapp{background:var(--whatsapp);color:#fff}
.add-session-form{background:#f8fafc;padding:15px;border-radius:10px;margin-top:10px}
.add-session-form input,.add-session-form textarea{margin-bottom:8px}
.add-session-form .btn{width:100%;margin-top:5px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:15px}
.loading-state{text-align:center;padding:30px;color:var(--main);font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:14px 24px;border-radius:12px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:10001;animation:slideIn 0.3s ease, fadeOut 0.3s ease 3.7s forwards}
.toast.error{background:var(--danger)}
@keyframes slideIn{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@media(max-width:900px){body{margin-right:0;padding:15px}.side-nav{right:-240px;transition:right 0.3s}.side-nav.open{right:0}.main-content{margin-right:0}.menu-toggle{display:flex!important}.patients-grid{grid-template-columns:1fr}.search-bar{flex-direction:column}.search-bar input,.search-bar select{width:100%}}
.menu-toggle{display:none;position:fixed;top:15px;right:15px;z-index:1000;background:var(--main);color:#fff;border:none;width:44px;height:44px;border-radius:10px;font-size:20px;cursor:pointer}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-new{background:#dbeafe;color:#1e40af}
.badge-regular{background:#dcfce7;color:#166534}
.badge-vip{background:#fef3c7;color:#92400e}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--main);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<div class="side-nav" id="sideNav">
  <h2 class="logo">🏥 عيادة د. تامر</h2>
  <a href="admin.html">🏠 لوحة المواعيد</a>
  <a href="index-admin.html">📂 إدارة الموقع</a>
  <a href="patients.html" class="active">📋 ملفات المرضى</a>
  <button class="logout-btn" onclick="logout()">🚪 خروج</button>
</div>
<div class="main-content">
  <div class="page-header">
    <h2>📋 ملفات المرضى</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span id="patientsCount" style="background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:13px">0 مريض</span>
      <button class="btn" style="background:#22c55e" onclick="exportPatients()">📥 تصدير Excel</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 بحث باسم المريض أو الهاتف..." onkeyup="debouncedFilter()">
    <select id="filterType" onchange="applyOnlineFilter()">
      <option value="all">📋 الكل</option>
      <option value="new">✨ مرضى جدد</option>
      <option value="regular">🔄 مرضى منتظمين</option>
      <option value="vip">⭐ مرضى مميزين</option>
    </select>
    <select id="sortBy" onchange="applyOnlineFilter()">
      <option value="newest">📅 الأحدث أولاً</option>
      <option value="oldest">📅 الأقدم أولاً</option>
      <option value="name">🔤 حسب الاسم</option>
    </select>
    <button class="btn" onclick="applyOnlineFilter()">🔄 تطبيق</button>
  </div>
  <div id="patientsList" class="patients-grid">
    <div class="loading-state">⏳ جاري تحميل ملفات المرضى...</div>
  </div>
</div>

<!-- ✅ المودال: عرض/تعديل ملف المريض -->
<div id="patientModal" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 class="modal-title">👤 ملف المريض</h3>
    <input type="hidden" id="modalPatientId">
    
    <div class="modal-section">
      <h4>📛 البيانات الأساسية</h4>
      <input type="text" id="modalName" placeholder="اسم المريض">
      <input type="tel" id="modalPhone" placeholder="رقم الهاتف">
      <input type="text" id="modalAge" placeholder="العمر (اختياري)">
      <select id="modalType" style="width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:10px">
        <option value="new">✨ مريض جديد</option>
        <option value="regular">🔄 مريض منتظم</option>
        <option value="vip">⭐ مريض مميز</option>
      </select>
    </div>
    
    <div class="modal-section">
      <h4>📝 ملاحظات عامة</h4>
      <textarea id="modalNotes" placeholder="ملاحظات هامة عن المريض..."></textarea>
    </div>
    
    <div class="modal-section">
      <h4>📅 سجل الجلسات <span id="sessionsCount" style="font-size:11px;color:var(--text-light)">(0)</span></h4>
      <div id="sessionsList" class="sessions-list"></div>
      
      <div class="add-session-form">
        <h4 style="margin:0 0 10px;font-size:13px">➕ إضافة جلسة جديدة</h4>
        <input type="date" id="newSessionDate">
        <input type="time" id="newSessionTime">
        <textarea id="newSessionNote" placeholder="ملاحظات الجلسة..."></textarea>
        <input type="number" id="newSessionPaid" placeholder="المبلغ المدفوع (اختياري)">
        <button class="btn" style="background:var(--success)" onclick="addSession()">💾 حفظ الجلسة</button>
      </div>
    </div>
    
    <div class="modal-actions">
      <button class="modal-btn modal-btn-whatsapp" onclick="openWhatsAppFromModal()">💬 واتساب</button>
      <button class="modal-btn modal-btn-primary" onclick="savePatient()">💾 حفظ التعديلات</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">إغلاق</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* =========================
   🔥 FIREBASE CONFIG - مشروع الدكتور تامر خطاب 🔥
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCXOOWSZU5YW0diViWO23mIXojmTLIggi0",
  authDomain: "dr-tamer-khatab.firebaseapp.com",
  projectId: "dr-tamer-khatab",
  storageBucket: "dr-tamer-khatab.firebasestorage.app",
  messagingSenderId: "801994611384",
  appId: "1:801994611384:web:d91064d8549b25427fb24d",
  measurementId: "G-F341FN0EL6"
};

const ADMIN_EMAIL = "admin@dr-tamer-khatab.com";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const patientsRef = collection(db, "patients");

let patientsCache = [];
const $ = (id) => document.getElementById(id);
let filterTimeout = null;

/* =========================
   🔐 حماية الصفحة: التأكد من أن المستخدم أدمن
========================= */
onAuthStateChanged(auth, (user) => {
  if (!user || user.email !== ADMIN_EMAIL) {
    alert("⚠️ يرجى تسجيل الدخول بحساب الأدمن");
    window.location.href = "login.html";
  } else {
    loadPatients();
  }
});

/* =========================
   دوال الواجهة
========================= */
window.toggleMenu = () => $("sideNav").classList.toggle("open");
window.logout = () => signOut(auth).then(() => location.href = "login.html");

// ✅ تحميل المرضى - متوافق مع createdAt (camelCase)
async function loadPatients() {
  try {
    $("patientsList").innerHTML = '<div class="loading-state">⏳ جاري التحميل...</div>';
    
    let snap;
    try { 
      const q = query(patientsRef, orderBy("createdAt", "desc")); 
      snap = await getDocs(q); 
    } catch (e1) { 
      const q = query(patientsRef); 
      snap = await getDocs(q); 
    }
    
    patientsCache = [];
    snap.forEach(d => {
      const data = d.data();
      data._ts = data.createdAt || data.updatedAt || data.created_at;
      
      const sessions = data.sessions || [];
      if (!data.type) {
        if (sessions.length >= 5) data.type = "vip";
        else if (sessions.length >= 2) data.type = "regular";
        else data.type = "new";
      }
      patientsCache.push({ id: d.id, ...data });
    });

    if (!snap.docs[0]?.data()?.createdAt) {
      patientsCache.sort((a, b) => (b._ts?.seconds || 0) - (a._ts?.seconds || 0));
    }
    
    renderPatients(patientsCache);
    $("patientsCount").textContent = `${patientsCache.length} مريض`;
    handleAutoOpenFromUrl();
    
    if (patientsCache.length === 0) {
      $("patientsList").innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><p>لا توجد ملفات مرضى</p><small>اضغط 💾 في لوحة التحكم لحفظ مريض</small></div>`;
    }
  } catch (err) {
    console.error("❌ Load Error:", err);
    $("patientsList").innerHTML = `<div class="empty-state" style="grid-column:1/-1;color:var(--danger)"><div class="icon">❌</div><p>فشل التحميل</p><small>${err.message}</small><br><button class="btn" style="margin-top:10px" onclick="loadPatients()">🔄 إعادة المحاولة</button></div>`;
  }
}

function renderPatients(list) {
  const container = $("patientsList");
  if (!list || list.length === 0) return;
  
  container.innerHTML = list.map(p => {
    const sessions = p.sessions || [];
    const badge = p.type === "vip" ? '<span class="badge badge-vip">⭐ مميز</span>' : 
                  p.type === "regular" ? '<span class="badge badge-regular">🔄 منتظم</span>' : 
                  '<span class="badge badge-new">✨ جديد</span>';
    const lastVisit = sessions.length ? sessions[sessions.length-1].date : "لا يوجد";
    
    return `<div class="patient-card" data-id="${p.id}">
        <div class="patient-header">
          <h3>${p.name || "بدون اسم"}</h3>
          <span class="phone">📞 ${p.phone || "-"}</span>
        </div>
        <div class="patient-body">
          <div class="patient-row"><span class="label">عدد الجلسات</span><span class="value">${sessions.length}</span></div>
          <div class="patient-row"><span class="label">آخر زيارة</span><span class="value">${lastVisit}</span></div>
          <div class="patient-row"><span class="label">الحالة</span><span class="value">${badge}</span></div>
          ${p.notes ? `<div class="patient-row"><span class="label">ملاحظة</span><span class="value" style="font-size:12px">${p.notes.substring(0,30)}${p.notes.length>30?'...':''}</span></div>` : ''}
        </div>
        <div class="patient-actions">
          <button class="btn-view" onclick="openPatientModal('${p.id}')">👁️ عرض</button>
          <button class="btn-whatsapp" onclick="openWhatsApp('${p.phone}')">💬</button>
          <button class="btn-edit" onclick="quickEdit('${p.id}')">✏️</button>
          <button class="btn-delete" onclick="deletePatient('${p.id}')">🗑️</button>
        </div>
      </div>`;
  }).join("");
}

window.applyOnlineFilter = async function() {
  const search = $("searchInput").value.trim().toLowerCase();
  const type = $("filterType").value;
  const sort = $("sortBy").value;
  
  $("patientsList").innerHTML = '<div class="loading-state">🔄 جاري البحث... <span class="loading-spinner"></span></div>';
  
  try {
    let snap;
    try {
      if (type !== "all" && sort === "newest") { 
        snap = await getDocs(query(patientsRef, where("type", "==", type), orderBy("createdAt", "desc"))); 
      } else if (type !== "all" && sort === "oldest") { 
        snap = await getDocs(query(patientsRef, where("type", "==", type), orderBy("createdAt", "asc"))); 
      } else { 
        snap = await getDocs(query(patientsRef, orderBy("createdAt", "desc"))); 
      }
    } catch { 
      snap = await getDocs(query(patientsRef)); 
    }
    
    let results = [];
    snap.forEach(d => {
      const data = d.data();
      data._ts = data.createdAt || data.updatedAt;
      if (!data.type) data.type = (data.sessions||[]).length >= 5 ? "vip" : (data.sessions||[]).length >= 2 ? "regular" : "new";
      results.push({ id: d.id, ...data });
    });
    
    if (search) {
      results = results.filter(p => 
        (p.name?.toLowerCase().includes(search)) || 
        (p.phone?.includes(search))
      );
    }
    if (sort === "name") {
      results.sort((a,b) => (a.name||"").localeCompare(b.name||""));
    }
    
    renderPatients(results);
    $("patientsCount").textContent = `${results.length} مريض`;
    
    if (results.length === 0) {
      $("patientsList").innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>لا توجد نتائج</p></div>`;
    }
  } catch (err) { 
    showToast("❌ فشل الفلتر", "error"); 
    loadPatients(); 
  }
};

window.debouncedFilter = function() {
  if (filterTimeout) clearTimeout(filterTimeout);
  filterTimeout = setTimeout(() => { applyOnlineFilter(); }, 500);
};

window.openPatientModal = async function(id) {
  try {
    const snap = await getDoc(doc(db, "patients", id));
    if (!snap.exists()) return showToast("❌ المريض غير موجود", "error");
    
    const p = snap.data();
    
    $("modalPatientId").value = id;
    $("modalName").value = p.name || "";
    $("modalPhone").value = p.phone || "";
    $("modalAge").value = p.age || "";
    $("modalType").value = p.type || "new";
    $("modalNotes").value = p.notes || "";
    
    const sessions = p.sessions || [];
    $("sessionsCount").textContent = `(${sessions.length})`;
    
    const sessionsList = $("sessionsList");
    if (!sessions.length) {
      sessionsList.innerHTML = '<div style="padding:15px;text-align:center;color:var(--text-light);font-size:13px">لا توجد جلسات</div>';
    } else {
      sessionsList.innerHTML = sessions.slice().reverse().map((s, idx) => `
        <div class="session-item">
          <div>
            <strong>📅 ${s.date||"-"} | ⏰ ${s.time||"-"}</strong>
            ${(s.note||s.notes) ? `<br><span style="color:var(--text-light);font-size:12px">${s.note||s.notes}</span>` : ""}
            ${s.paid ? `<br><span style="color:var(--success);font-size:12px">💰 ${s.paid} ج.م</span>` : ""}
          </div>
          <div class="actions">
            <button onclick="deleteSession('${id}', ${idx})">🗑️</button>
          </div>
        </div>
      `).join("");
    }
    
    $("newSessionDate").value = new Date().toISOString().split("T")[0];
    $("newSessionTime").value = "";
    $("newSessionNote").value = "";
    $("newSessionPaid").value = "";
    
    $("patientModal").style.display = "flex";
    
  } catch (err) { 
    console.error("❌ Open modal error:", err);
    showToast("❌ فشل فتح الملف", "error"); 
  }
};

window.closeModal = function() { 
  $("patientModal").style.display = "none"; 
};

window.savePatient = async function() {
  const id = $("modalPatientId").value;
  if (!id) return;
  
  try {
    await updateDoc(doc(db, "patients", id), {
      name: $("modalName").value.trim(), 
      phone: $("modalPhone").value.trim(),
      age: $("modalAge").value.trim(), 
      type: $("modalType").value,
      notes: $("modalNotes").value.trim(), 
      updatedAt: serverTimestamp()
    });
    showToast("✅ تم حفظ التعديلات"); 
    closeModal(); 
    applyOnlineFilter();
  } catch (err) { 
    console.error("❌ Save error:", err);

};

// ✅ ✅ ✅ دالة addSession المُصححة: باستخدام new Date() بدل serverTimestamp() داخل المصفوفة
window.addSession = async function() {
  const id = $("modalPatientId").value;
  const date = $("newSessionDate").value;
  
  if (!date) return showToast("⚠️ اختر تاريخ الجلسة", "error");
  
  try {
    const patientRef = doc(db, "patients", id);
    const snap = await getDoc(patientRef);
    const p = snap.data();
    const sessions = p.sessions || [];
    
    // ✅ استخدام new Date() بدل serverTimestamp() (لأن فايربيس لا يدعمه داخل المصفوفات)
    sessions.push({ 
      date, 
      time: $("newSessionTime").value, 
      note: $("newSessionNote").value.trim(),
      paid: $("newSessionPaid").value ? Number($("newSessionPaid").value) : null, 
      createdAt: new Date()  // ✅ ✅ ✅ هذا هو التصحيح المطلوب
    });
    
    await updateDoc(patientRef, { 
      sessions, 
      updatedAt: serverTimestamp()  // ✅ هذا بره المصفوفة فمسموح
    });
    
    showToast("✅ تم إضافة الجلسة"); 
    openPatientModal(id);
    
  } catch (err) { 
    console.error("❌ Add session error:", err);
    showToast("❌ فشل الإضافة: " + err.message, "error"); 
  }
};

window.deleteSession = async function(patientId, sessionIndex) {
  if (!confirm("⚠️ هل تريد حذف هذه الجلسة نهائياً؟")) return;
  
  try {
    const patientRef = doc(db, "patients", patientId);
    const snap = await getDoc(patientRef);
    const p = snap.data();
    const sessions = p.sessions || [];
    
    sessions.splice(sessionIndex, 1);
    
    await updateDoc(patientRef, { 
      sessions, 
      updatedAt: serverTimestamp() 
    });
    
    showToast("✅ تم حذف الجلسة"); 
    openPatientModal(patientId);
    
  } catch (err) { 
    console.error("❌ Delete session error:", err);
    showToast("❌ فشل الحذف: " + err.message, "error"); 
  }
};

window.exportPatients = async function() {
  try {
    $("patientsList").innerHTML = '<div class="loading-state">📥 جاري التصدير...</div>';
    
    const snap = await getDocs(query(patientsRef, orderBy("createdAt", "desc")));
    const rows = [];
    
    snap.forEach(d => {
      const p = d.data(); 
      const s = p.sessions || [];
      rows.push([
        p.name || "", 
        p.phone || "", 
        p.age || "", 
        p.type || "new", 
        s.length, 
        s[s.length-1]?.date || "-", 
        (p.notes || "").replace(/,/g, ";")
      ]);
    });
    
    const header = ["الاسم", "الهاتف", "العمر", "النوع", "الجلسات", "آخر زيارة", "ملاحظات"].join(",");
    const csvContent = "\uFEFF" + header + "," + rows.map(r => r.join(",")).join("\n");
    
    const blob = new Blob([csvContent], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a"); 
    link.href = URL.createObjectURL(blob); 
    link.download = `patients_dr-tamer_${new Date().toISOString().split("T")[0]}.csv`; 
    link.click();
    
    showToast("✅ تم تصدير الملف"); 
    applyOnlineFilter();
    
  } catch (err) { 
    console.error("❌ Export error:", err);
    showToast("❌ فشل التصدير", "error"); 
  }
};

function showToast(msg, type = "success") {
  const toast = document.createElement("div"); 
  toast.className = `toast ${type === "error" ? "error" : ""}`;
  toast.textContent = msg; 
  document.body.appendChild(toast); 
  setTimeout(() => toast.remove(), 4000);
}

$("patientModal")?.addEventListener("click", (e) => { 
  if (e.target === $("patientModal")) closeModal(); 
});

function cleanPhone(phone) { 
  if (!phone) return ""; 
  let p = String(phone).replace(/[^0-9]/g, ''); 
  p = p.replace(/^0+/, ''); 
  return p.startsWith('20') ? p : '20' + p; 
}

async function handleAutoOpenFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const autoOpen = params.get('autoOpen');
  const phoneParam = params.get('phone');
  const pidParam = params.get('pid');
  
  if (autoOpen === 'true' && (phoneParam || pidParam)) {
    setTimeout(async () => {
      try {
        let targetPatient = null;
        
        if (pidParam) { 
          const snap = await getDoc(doc(db, "patients", pidParam)); 
          if (snap.exists()) {
            targetPatient = { id: snap.id, ...snap.data() }; 
          }
        }
        
        if (!targetPatient && phoneParam) {
          const fullPhone = cleanPhone(phoneParam);
          targetPatient = patientsCache.find(p => cleanPhone(p.phone || "") === fullPhone) || null;
        }
        
        if (targetPatient) {
          await openPatientModal(targetPatient.id);
          window.history.replaceState({}, document.title, window.location.pathname);
          showToast("📋 تم فتح ملف: " + (targetPatient.name || "مريض"));
        }
      } catch (err) { 
        console.error("❌ Auto-open error:", err); 
      }
    }, 1500);
  }
}
