<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد - عيادة الدكتور تامر خطاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a237e;--primary-light:#3949ab;--bg:#f4f7f6;--white:#fff;--text:#333;--success:#2e7d32;--danger:#f44336;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center;min-height:100vh}
.booking-box{background:var(--white);padding:30px;border-radius:var(--radius);box-shadow:0 10px 30px rgba(0,0,0,0.1);width:100%;max-width:500px}
.booking-box h2{color:var(--primary);margin-bottom:20px;text-align:center}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:14px}
.form-group input{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:14px;transition:0.2s}
.form-group input:focus{border-color:var(--primary);outline:none}
.slots-container{margin:20px 0;max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:10px;padding:10px}
.slot-item{padding:12px;margin:5px 0;background:#f8f9fa;border-radius:8px;cursor:pointer;transition:0.2s;display:flex;justify-content:space-between;align-items:center}
.slot-item:hover{background:#e8eaf6;transform:translateX(-3px)}
.slot-item.selected{background:var(--primary);color:#fff}
.slot-item.booked{background:#ffebee;color:var(--danger);cursor:not-allowed;opacity:0.7}
.btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:16px;font-weight:600;transition:0.2s;margin-top:10px}
.btn:hover{background:var(--primary-light);transform:translateY(-2px)}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none}
.no-slots{text-align:center;padding:20px;color:var(--text)}
.request-btn{background:var(--success);margin-top:10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:14px 24px;border-radius:12px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:1000;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.loading{text-align:center;color:#666;padding:20px}
.back-link{text-align:center;margin-bottom:15px}
.back-link a{color:var(--primary);text-decoration:none;font-size:14px;font-weight:500}
.back-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="booking-box">
  <h2>📅 احجز موعدك</h2>
  <p style="text-align:center;color:#666;margin-bottom:10px;font-size:14px;">عيادة الدكتور تامر خطاب</p>
  <p style="text-align:center;color:var(--primary);margin-bottom:20px;font-size:13px;font-weight:500;">استشاري الباطنة وأمراض الدم</p>
  
  <div class="back-link"><a href="index.html">← العودة للرئيسية</a></div>
  
  <div class="form-group"><label>الاسم الكامل *</label><input type="text" id="pName" placeholder="أدخل اسمك الثلاثي"></div>
  <div class="form-group"><label>رقم الهاتف *</label><input type="tel" id="pPhone" placeholder="01xxxxxxxxx"></div>
  <div class="form-group"><label>اختر التاريخ *</label><input type="date" id="dateInput" style="padding:12px;"></div>
  
  <div id="slotsContainer" class="slots-container"><p class="loading">⏳ اختر تاريخاً لعرض المواعيد المتاحة</p></div>
  
  <button id="bookBtn" class="btn" onclick="handleBook()" disabled>تأكيد الحجز</button>
  <p style="text-align:center;margin-top:15px;font-size:12px;color:#666;">🔒 بياناتك محمية وسيتم التواصل معك عبر واتساب لتأكيد الموعد</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= 🔥 FIREBASE CONFIG - مشروع الدكتور تامر خطاب 🔥 ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCXOOWSZU5YW0diViWO23mIXojmTLIggi0",
  authDomain: "dr-tamer-khatab.firebaseapp.com",
  projectId: "dr-tamer-khatab",
  storageBucket: "dr-tamer-khatab.firebasestorage.app",
  messagingSenderId: "801994611384",
  appId: "1:801994611384:web:d91064d8549b25427fb24d",
  measurementId: "G-F341FN0EL6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const slotsRef = collection(db, "slots");
const requestsRef = collection(db, "requests");

let slotsCache = [];
let selectedSlotId = null;
const $ = (id) => document.getElementById(id);

onSnapshot(slotsRef, (snap) => {
  slotsCache = [];
  snap.forEach(d => slotsCache.push({ id: d.id, ...d.data() }));
  const selectedDate = $("dateInput")?.value;
  if (selectedDate) renderSlotsByDate(selectedDate);
});

function renderSlotsByDate(date) {
  const container = $("slotsContainer");
  const bookBtn = $("bookBtn");
  container.innerHTML = '<p class="loading">⏳ جاري تحميل المواعيد...</p>';
  bookBtn.disabled = true;
  selectedSlotId = null;
  
  if (!date) return;
  
  const available = slotsCache.filter(s => s.date === date && !s.booked && s.status !== "cancelled");
  
  if (available.length > 0) {
    available.sort((a, b) => a.time.localeCompare(b.time));
    container.innerHTML = "";
    available.forEach(slot => {
      const div = document.createElement("div");
      div.className = "slot-item";
      div.innerHTML = `<span>🕒 ${slot.time}</span><span style="font-size:12px;color:var(--success)">متاح</span>`;
      div.onclick = () => {
        document.querySelectorAll(".slot-item").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
        selectedSlotId = slot.id;
        bookBtn.disabled = false;
      };
      container.appendChild(div);
    });
  } else {
    const anySlots = slotsCache.some(s => s.date === date);
    if (!anySlots) {
      container.innerHTML = `<p class="no-slots">⚠️ لا توجد مواعيد مضافة لهذا اليوم بعد</p>
        <button class="btn request-btn" onclick="handleSendBookingRequest('${date}')">📝 إرسال طلب حجز</button>`;
    } else {
      container.innerHTML = `<p class="no-slots" style="color:var(--danger)">❌ جميع مواعيد هذا اليوم محجوزة</p>`;
    }
  }
}

$("dateInput")?.addEventListener("change", (e) => {
  const date = e.target.value;
  if (date) renderSlotsByDate(date);
});

window.handleBook = async function() {
  const name = $("pName")?.value.trim();
  const phone = $("pPhone")?.value.trim();
  const date = $("dateInput")?.value;
  const bookBtn = $("bookBtn");
  
  if (!selectedSlotId) return showToast("⚠️ اختر ميعاداً من القائمة أولاً", "error");
  if (!name || !phone || !date) return showToast("⚠️ اكمل البيانات: الاسم والهاتف مطلوبان", "error");
  
  bookBtn.disabled = true;
  bookBtn.textContent = "جاري الحجز...";
  
  try {
    const slotRef = doc(db, "slots", selectedSlotId);
    const slotSnap = await getDoc(slotRef);
    
    if (!slotSnap.exists()) {
      showToast("❌ الميعاد غير موجود", "error");
      renderSlotsByDate(date);
      bookBtn.disabled = false;
      bookBtn.textContent = "تأكيد الحجز";
      return;
    }
    
    const slotData = slotSnap.data();
    const isAlreadyBooked = slotData.booked === true || slotData.status === "booked";
    if (isAlreadyBooked) {
      showToast("❌ هذا الميعاد تم حجزه للتو، اختر ميعاد آخر", "error");
      renderSlotsByDate(date);
      bookBtn.disabled = false;
      bookBtn.textContent = "تأكيد الحجز";
      return;
    }
    
    await updateDoc(slotRef, {
      booked: true,
      status: "booked",
      patient: { name: name, phone: phone },
      updatedAt: serverTimestamp()
    });
    
    showToast("✅ تم الحجز بنجاح! هنتواصل معاك عبر واتساب قريباً");
    selectedSlotId = null;
    $("pName").value = ""; 
    $("pPhone").value = "";
    renderSlotsByDate(date);
    
  } catch (err) {
    console.error("❌ Booking Error:", err);
    let errorMsg = "❌ حدث خطأ أثناء الحجز";
    if (err.code === "permission-denied") {
      errorMsg = "❌ خطأ في الصلاحيات - راجع قواعد فايربيس";
    } else if (err.code === "not-found") {
      errorMsg = "❌ الميعاد غير موجود";
    } else if (err.message) {
      errorMsg = "❌ " + err.message;
    }
    showToast(errorMsg, "error");
    bookBtn.disabled = false;
    bookBtn.textContent = "تأكيد الحجز";
  }
};

window.handleSendBookingRequest = async function(date) {
  const name = $("pName")?.value.trim();
  const phone = $("pPhone")?.value.trim();
  
  if (!name || !phone) return showToast("⚠️ اكتب الاسم والهاتف عشان نرسل طلبك", "error");
  
  try {
    await addDoc(requestsRef, {
      name, phone, date, status: "pending",
      source: "booking_page", createdAt: serverTimestamp(),
      clinic: "dr-tamer-khatab"
    });
    showToast("✅ تم إرسال طلبك! هنتواصل معاك عبر واتساب لتأكيد الميعاد");
    $("pName").value = ""; $("pPhone").value = "";
  } catch (err) {
    console.error("❌ Request Error:", err);
    showToast("❌ فشل إرسال الطلب، حاول مرة أخرى", "error");
  }
};

function showToast(msg, type = "success") {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.style.background = type === "error" ? "var(--danger)" : "var(--success)";
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}
console.log("✅ Booking Page Loaded - dr-tamer-khatab Connected");
</script>
</body>
</html>
