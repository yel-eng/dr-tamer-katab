// ✅ ✅ ✅ دالة savePatientFromSlot المُصححة نهائيًا
window.savePatientFromSlot = async (slotId) => { 
  const slot = cache.find(s => s.id === slotId); 
  if (!slot || !slot.patient?.phone) return alert("⚠️ لا توجد بيانات"); 
  const phone = cleanPhone(slot.patient.phone); 
  const cleanName = (slot.patient.name || "").trim();
  
  try { 
    const q = query(patientsRef, where("phone", "==", phone)); 
    const snap = await getDocs(q); 
    let patientId; 
    
    if (snap.empty) { 
      const newPatient = { 
        name: cleanName, 
        phone: phone, 
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        age: "", 
        type: "new", 
        notes: "",
        sessions: [{ 
          date: slot.date, 
          time: slot.time, 
          note: slot.patient.notes || "", 
          paid: slot.paid || 0, 
          slot_id: slotId, 
          createdAt: new Date()  // ✅ ✅ ✅ التصحيح النهائي
        }]
      }; 
      const docRef = await addDoc(patientsRef, newPatient); 
      patientId = docRef.id; 
      showAdminNotification("✅ تم إنشاء ملف لـ " + cleanName); 
    } else { 
      patientId = snap.docs[0].id; 
      await updateDoc(doc(db, "patients", patientId), { 
        sessions: arrayUnion({ 
          date: slot.date, 
          time: slot.time, 
          note: slot.patient.notes || "", 
          paid: slot.paid || 0, 
          slot_id: slotId, 
          createdAt: new Date()  // ✅ ✅ ✅ التصحيح النهائي
        }), 
        updatedAt: serverTimestamp(),
        name: cleanName
      }); 
      showAdminNotification("✅ أضيفت جلسة لـ " + cleanName); 
    } 
    
    await updateDoc(doc(db, "slots", slotId), { 
      patient_id: patientId, 
      is_saved_patient: true 
    }); 
    
    renderSlots();
    const phoneParam = encodeURIComponent(phone);
    window.location.href = `patients.html?phone=${phoneParam}&autoOpen=true&pid=${patientId}`;
    
  } catch (err) { 
    console.error("❌ Save patient error:", err); 
    alert("❌ خطأ: " + err.message); 
  } 
};

function cleanPhone(phone) { 
  if (!phone) return ""; 
  const p = String(phone).replace(/^0+/, '').replace(/\s/g, ''); 
  return p.startsWith('20') ? p : '20' + p; 
}

function isSavedPatient(phone) { 
  if (!phone) return false; 
  const clean = cleanPhone(phone); 
  return cache.some(s => s.patient?.phone && cleanPhone(s.patient.phone) === clean && s.is_saved_patient); 
}

      if (slotItem && typeof window.selectSlot === 'function') {
        const id = slotItem.dataset.id;
        if (id) { e.stopPropagation(); window.selectSlot(id); }
      }
